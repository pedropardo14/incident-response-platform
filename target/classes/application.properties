application.name=iris
info.app.version=1.0.0
info.app.description=IRIS - Incident Response Intelligence System

rest.server.port=8200
rest.automation=true
server.port=8201

log.format=text

spring.web.resources.static-locations=classpath:/public

web.component.scan=com.accenture

cloud.connector=none

# Health check
mandatory.health.dependencies=iris.health

snake.case.serialization=true

show.application.properties=server.port, cloud.connector

# REST automation + flows
yaml.rest.automation=classpath:/rest.yaml
yaml.flow.automation=classpath:/flows.yaml

# Cron schedule for post-deploy health checks (every 5 minutes)
yaml.cron=classpath:/cron.yaml

api.origin=*

trace.http.header=X-Correlation-Id, X-Trace-Id

# Postgres connection
spring.datasource.url=${IRIS_DB_URL:jdbc:postgresql://localhost:5432/iris}
spring.datasource.username=${IRIS_DB_USER:iris}
spring.datasource.password=${IRIS_DB_PASSWORD:iris}
spring.datasource.driver-class-name=org.postgresql.Driver

# External integrations (set via environment variables)
github.token=${GITHUB_TOKEN:}
github.owner=${GITHUB_OWNER:}
github.repo=${GITHUB_REPO:}

teams.webhook.url=${TEAMS_WEBHOOK_URL:}

notion.token=${NOTION_TOKEN:}
notion.database.id=${NOTION_DATABASE_ID:}
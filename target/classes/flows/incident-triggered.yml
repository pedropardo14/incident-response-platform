flow:
  id: 'incident-triggered'
  description: >
    Core incident response flow. Triggered by a GitHub Actions failure webhook.
    After parsing, forks to fetch commits and metrics in parallel, then assesses
    severity, stores the incident, then forks to notify Teams and create a Notion
    page in parallel before updating the final record.
  ttl: 30s
  exception: 'v1.iris.exception'

first.task: 'v1.github.parse.webhook'

tasks:

  # ── Step 1: Parse webhook, return 202 immediately to GitHub ───────────────
  - input:
      - 'input.body -> *'
    process: 'v1.github.parse.webhook'
    output:
      - 'result.workflow_name -> model.workflow_name'
      - 'result.repository    -> model.repository'
      - 'result.branch        -> model.branch'
      - 'result.conclusion    -> model.conclusion'
      - 'result.workflow_url  -> model.workflow_url'
      - 'result.head_sha      -> model.head_sha'
      - 'int(202) -> output.status'
    description: 'Parse GitHub Actions webhook and acknowledge immediately'
    execution: response
    next:
      - 'v1.triage.start'

  # ── Step 2: Fork — fetch commits and metrics in parallel ──────────────────
  - input:
      - 'model.repository -> header.repository'
      - 'model.head_sha   -> header.sha'
    process: 'v1.triage.start'
    output: []
    description: 'Fork into parallel triage tasks'
    execution: fork
    next:
      - 'v1.github.fetch.commits'
      - 'v1.metrics.fetch'
    join: 'v1.severity.assess'

  # ── Step 2a: Fetch recent commits (sink) ──────────────────────────────────
  - input:
      - 'model.repository -> header.repository'
      - 'model.head_sha   -> header.sha'
    process: 'v1.github.fetch.commits'
    output:
      - 'result -> model.recent_commits'
    description: 'Fetch the last 5 commits from the affected repository'
    execution: sink

  # ── Step 2b: Fetch service metrics (sink) ─────────────────────────────────
  - input:
      - 'text(fetch) -> action'
    process: 'v1.metrics.fetch'
    output:
      - 'result -> model.metrics'
    description: 'Fetch latest error metrics for all services from Postgres'
    execution: sink

  # ── Step 3: Assess severity (join point) ──────────────────────────────────
  - input:
      - 'model.metrics    -> *'
      - 'model.conclusion -> header.conclusion'
      - 'model.branch     -> header.branch'
    process: 'v1.severity.assess'
    output:
      - 'result.severity -> model.severity'
      - 'result.reason   -> model.severity_reason'
    description: 'Determine severity from branch, conclusion, and error metrics'
    execution: sequential
    next:
      - 'v1.incident.store'

  # ── Step 4: Persist incident ──────────────────────────────────────────────
  - input:
      - 'model.workflow_name -> header.workflow_name'
      - 'model.repository    -> header.repository'
      - 'model.branch        -> header.branch'
      - 'model.conclusion    -> header.conclusion'
      - 'model.severity      -> header.severity'
    process: 'v1.incident.store'
    output:
      - 'result.incident_id -> model.incident_id'
      - 'result.title       -> model.incident_title'
    description: 'Persist incident record to Postgres'
    execution: fork
    next:
      - 'v1.teams.notify'
      - 'v1.notion.create.page'
    join: 'v1.incident.update'

  # ── Step 5a: Notify Teams (sink) ──────────────────────────────────────────
  - input:
      - 'model.metrics       -> *'
      - 'model.incident_id   -> header.incident_id'
      - 'model.severity      -> header.severity'
      - 'model.workflow_name -> header.workflow_name'
      - 'model.repository    -> header.repository'
      - 'model.branch        -> header.branch'
      - 'model.conclusion    -> header.conclusion'
      - 'model.workflow_url  -> header.workflow_url'
    process: 'v1.teams.notify'
    output:
      - 'result.teams_notified -> model.teams_notified'
    description: 'Post incident alert card to Microsoft Teams'
    execution: sink

  # ── Step 5b: Create Notion page (sink) ────────────────────────────────────
  - input:
      - 'model.recent_commits -> *'
      - 'model.incident_id    -> header.incident_id'
      - 'model.severity       -> header.severity'
      - 'model.workflow_name  -> header.workflow_name'
      - 'model.repository     -> header.repository'
      - 'model.branch         -> header.branch'
      - 'model.conclusion     -> header.conclusion'
      - 'model.workflow_url   -> header.workflow_url'
    process: 'v1.notion.create.page'
    output:
      - 'result.notion_page_url -> model.notion_page_url'
    description: 'Create structured incident report page in Notion'
    execution: sink

  # ── Step 6: Update incident record (join point) ───────────────────────────
  - input:
      - 'model.incident_id     -> header.incident_id'
      - 'model.notion_page_url -> header.notion_page_url'
      - 'model.teams_notified  -> header.teams_notified'
    process: 'v1.incident.update'
    output: []
    description: 'Update incident with Notion URL and Teams notification status'
    execution: end

  # ── Exception handler ─────────────────────────────────────────────────────
  - input:
      - 'error.code    -> status'
      - 'error.message -> message'
      - 'error.stack   -> stack'
    process: 'v1.iris.exception'
    output:
      - 'result.status -> output.status'
      - 'result        -> output.body'
    description: 'Handle flow errors'
    execution: end
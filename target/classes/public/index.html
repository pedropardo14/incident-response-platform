<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRIS — Incident Response Intelligence System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    header h1 span {
      color: #58a6ff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      font-size: 13px;
      color: #8b949e;
    }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }

    .stat-card .label {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-card.critical .value { color: #f85149; }
    .stat-card.open .value    { color: #d29922; }
    .stat-card.resolved .value { color: #3fb950; }
    .stat-card.total .value   { color: #58a6ff; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toolbar h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #58a6ff; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #2ea043; }

    .btn-danger {
      background: transparent;
      border-color: #f85149;
      color: #f85149;
    }

    .btn-danger:hover:not(:disabled) { background: rgba(248, 81, 73, 0.1); }

    .btn-ghost {
      background: transparent;
      border-color: #30363d;
      color: #e6edf3;
    }

    .btn-ghost:hover:not(:disabled) { background: #21262d; }

    /* ── Incidents table ── */
    .table-wrap {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: #1c2128;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #8b949e;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #30363d;
    }

    tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1c2128; }

    td { padding: 14px 16px; vertical-align: middle; }

    .incident-title {
      font-weight: 500;
      color: #e6edf3;
      margin-bottom: 4px;
    }

    .incident-meta {
      font-size: 12px;
      color: #8b949e;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-critical { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
    .badge-high     { background: rgba(210,153,34,0.15); color: #e3b341; border: 1px solid rgba(210,153,34,0.3); }
    .badge-medium   { background: rgba(210,153,34,0.08); color: #d29922; border: 1px solid rgba(210,153,34,0.2); }
    .badge-low      { background: rgba(56,139,253,0.1);  color: #58a6ff; border: 1px solid rgba(56,139,253,0.2); }
    .badge-open     { background: rgba(248,81,73,0.1);   color: #f85149; border: 1px solid rgba(248,81,73,0.2); }
    .badge-resolved { background: rgba(63,185,80,0.1);   color: #3fb950; border: 1px solid rgba(63,185,80,0.2); }

    /* ── Notion link ── */
    .notion-link {
      color: #58a6ff;
      text-decoration: none;
      font-size: 12px;
    }

    .notion-link:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 64px 24px;
      color: #8b949e;
    }

    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 13px;
      max-width: 320px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.success { border-color: #3fb950; color: #3fb950; }
    #toast.error   { border-color: #f85149; color: #f85149; }
    #toast.info    { border-color: #58a6ff; color: #58a6ff; }

    /* ── Spinner ── */
    .spin {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1><span>IRIS</span> — Incident Response Intelligence System</h1>
  <div class="header-right">
    <span class="status-label"><span class="status-dot"></span>Live</span>
    <button class="btn btn-ghost" onclick="loadIncidents()">↺ Refresh</button>
    <button class="btn btn-primary" id="simulate-btn" onclick="simulateFailure()">
      + Simulate Failure
    </button>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card total">
      <div class="label">Total</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card open">
      <div class="label">Open</div>
      <div class="value" id="stat-open">—</div>
    </div>
    <div class="stat-card critical">
      <div class="label">Critical</div>
      <div class="value" id="stat-critical">—</div>
    </div>
    <div class="stat-card resolved">
      <div class="label">Resolved</div>
      <div class="value" id="stat-resolved">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <h2>Incidents</h2>
    <div class="toolbar-right">
      <select id="filter" onchange="loadIncidents()">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Incident</th>
          <th>Severity</th>
          <th>Status</th>
          <th class="hide-mobile">Repository</th>
          <th class="hide-mobile">Triggered</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="incidents-body">
        <tr><td colspan="7"><div class="empty"><div class="icon">⏳</div><p>Loading...</p></div></td></tr>
      </tbody>
    </table>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = '';

  async function loadIncidents() {
    const filter = document.getElementById('filter').value;
    const url = filter ? `${API}/api/incidents?status=${filter}` : `${API}/api/incidents`;

    try {
      const res = await fetch(url);
      const data = await res.json();
      renderTable(Array.isArray(data) ? data : []);
      updateStats(Array.isArray(data) ? data : []);
    } catch (e) {
      showToast('Failed to load incidents', 'error');
    }
  }

  function renderTable(incidents) {
    const tbody = document.getElementById('incidents-body');

    if (incidents.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="7">
          <div class="empty">
            <div class="icon">✅</div>
            <p>No incidents found. Click <strong>Simulate Failure</strong> to trigger one.</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = incidents.map(inc => `
      <tr>
        <td style="color:#8b949e;font-size:12px">#${inc.id}</td>
        <td>
          <div class="incident-title">${escHtml(inc.title)}</div>
          <div class="incident-meta">${escHtml(inc.workflow_name || '')} · ${escHtml(inc.branch || '')} · ${escHtml(inc.conclusion || '')}</div>
        </td>
        <td><span class="badge badge-${inc.severity}">${inc.severity}</span></td>
        <td><span class="badge badge-${inc.status}">${inc.status}</span></td>
        <td class="hide-mobile" style="color:#8b949e;font-size:12px">${escHtml(inc.repository || '')}</td>
        <td class="hide-mobile" style="color:#8b949e;font-size:12px">${formatDate(inc.triggered_at)}</td>
        <td>
          <div style="display:flex;gap:8px;align-items:center">
            ${inc.notion_page_url
              ? `<a class="notion-link" href="${escHtml(inc.notion_page_url)}" target="_blank">Notion ↗</a>`
              : ''}
            ${inc.status === 'open'
              ? `<button class="btn btn-danger" onclick="resolveIncident(${inc.id}, this)">Resolve</button>`
              : `<span style="color:#3fb950;font-size:12px">✓ ${formatDate(inc.resolved_at)}</span>`}
          </div>
        </td>
      </tr>
    `).join('');
  }

  function updateStats(incidents) {
    document.getElementById('stat-total').textContent    = incidents.length;
    document.getElementById('stat-open').textContent     = incidents.filter(i => i.status === 'open').length;
    document.getElementById('stat-critical').textContent = incidents.filter(i => i.severity === 'critical').length;
    document.getElementById('stat-resolved').textContent = incidents.filter(i => i.status === 'resolved').length;
  }

  async function simulateFailure() {
    const btn = document.getElementById('simulate-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Simulating...';

    try {
      const res = await fetch(`${API}/api/simulate/failure`, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        showToast(`Incident #${data.incident_id} created: ${data.title}`, 'success');
        await loadIncidents();
      } else {
        showToast(data.message || 'Simulation failed', 'error');
      }
    } catch (e) {
      showToast('Request failed', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '+ Simulate Failure';
    }
  }

  async function resolveIncident(id, btn) {
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch(`${API}/api/incidents/${id}/resolve`, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        showToast(`Incident #${id} resolved`, 'success');
        await loadIncidents();
      } else {
        showToast(data.message || 'Failed to resolve', 'error');
        btn.disabled = false;
        btn.textContent = 'Resolve';
      }
    } catch (e) {
      showToast('Request failed', 'error');
      btn.disabled = false;
      btn.textContent = 'Resolve';
    }
  }

  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3500);
  }

  function formatDate(str) {
    if (!str) return '—';
    return str.replace('T', ' ').substring(0, 16);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Auto-refresh every 15 seconds
  loadIncidents();
  setInterval(loadIncidents, 15000);
</script>

</body>
</html>
